---
- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key (for containerd)
  get_url:
    url: "{{ docker_apt_mirror }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] {{ docker_apt_mirror }} {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install containerd
  apt:
    name: containerd.io
    state: present
    update_cache: true

- name: Ensure containerd config directory exists
  file:
    path: /etc/containerd
    state: directory

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Enable SystemdCgroup for containerd
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Restart and enable containerd
  service:
    name: containerd
    state: restarted
    enabled: true
