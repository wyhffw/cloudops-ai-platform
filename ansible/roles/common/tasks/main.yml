---
- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts for cluster nodes
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE K8S HOSTS"
    block: |
      192.168.1.20 master
      192.168.1.21 worker1

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Install base packages
  apt:
    name:
      - curl
      - wget
      - vim
      - git
      - net-tools
      - ca-certificates
      - apt-transport-https
      - gnupg
      - lsb-release
      - chrony
      - software-properties-common
    state: present
    update_cache: true

- name: Enable chrony
  service:
    name: chrony
    state: started
    enabled: true

- name: Disable swap now
  command: swapoff -a
  changed_when: false

- name: Disable swap in fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Load kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Configure sysctl for Kubernetes
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl
  command: sysctl --system
  changed_when: false
